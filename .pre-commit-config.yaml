repos:
  - repo: local
    hooks:
      - id: intentflow-format-check
        name: intentflow format --check
        entry: python -m intentflow.cli format --check
        language: system
        files: \.iflow$

      - id: intentflow-validate
        name: intentflow validate
        entry: python -m intentflow.cli validate
        language: system
        files: \.iflow$

      - id: intentflow-lint
        name: intentflow lint --strict
        entry: python -m intentflow.cli lint --strict
        language: system
        files: \.iflow$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
